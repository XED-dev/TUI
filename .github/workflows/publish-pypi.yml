name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Build & publish to PyPI
    runs-on: ubuntu-latest
    # environment: pypi  # re-enable after OIDC trusted publishing is configured

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build sdist + wheel
        run: uv build

      - name: Publish to PyPI
        run: uv publish --token ${{ secrets.PYPI_API_TOKEN }}
        # After first release: switch to OIDC trusted publishing at
        # pypi.org/manage/project/xed-tui/settings/publishing/
        # and restore: permissions: id-token: write  +  environment: pypi
        # and replace this step with: uses: pypa/gh-action-pypi-publish@release/v1
