name: Update Homebrew Tap

on:
  workflow_run:
    workflows: ["Publish to PyPI"]
    types: [completed]

jobs:
  update-tap:
    name: Bump xed-tui formula in homebrew-xed tap
    runs-on: ubuntu-latest
    # Only run if PyPI publish succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - name: Compute SHA256 of PyPI sdist
        run: |
          # Tag name is in head_branch for workflow_run triggered by tag push
          TAG="${{ github.event.workflow_run.head_branch }}"
          VERSION="${TAG#v}"
          URL="https://files.pythonhosted.org/packages/source/x/xed-tui/xed_tui-${VERSION}.tar.gz"
          # Retry up to 5 times (PyPI CDN propagation after publish)
          for i in 1 2 3 4 5; do
            SHA=$(curl -fsSL "$URL" | sha256sum | cut -d' ' -f1)
            [ ${#SHA} -eq 64 ] && break
            echo "Attempt $i: waiting for PyPI CDN..."
            sleep 60
          done
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "SHA256=$SHA"      >> $GITHUB_ENV
          echo "URL=$URL"         >> $GITHUB_ENV

      - name: Patch formula
        run: |
          sed -i \
            -e "s|url \".*\"|url \"$URL\"|" \
            -e "s|sha256 \".*\"|sha256 \"$SHA256\"|" \
            packaging/homebrew/xed-tui.rb

      - name: Push updated formula to homebrew-xed tap
        uses: cpina/github-action-push-to-another-repository@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        with:
          source-directory: packaging/homebrew
          destination-github-username: XED-dev
          destination-repository-name: homebrew-xed
          target-directory: Formula
          target-branch: main
          commit-message: "chore: bump xed-tui to ${{ env.VERSION }}"
