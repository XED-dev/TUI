  <h1>XED /TUI</h1>
  <p>A mutt-style session browser for Claude Code — terminal-first, zero dependencies.</p>

  <h2>Install</h2>
  <pre><code>curl -fsSL https://tui.xed.dev/install.sh | bash</code></pre>

  <h2>Or via pip / uv / brew</h2>
  <pre><code>pipx install xed-tui
uv tool install xed-tui
brew tap xed-dev/xed &amp;&amp; brew install xed-tui</code></pre>
